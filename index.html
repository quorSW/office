<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Office — Cozy Pixel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">telegram mini app concept</p>
        <h1>AI Office</h1>
      </div>
      <div class="topbar-actions">
        <button id="newTaskBtn" class="btn btn-primary">+ Новая задача</button>
        <button id="pulseBtn" class="btn">Запустить день</button>
      </div>
    </header>

    <main class="layout">
      <section class="office-card">
        <div class="office-header">
          <div>
            <h2>Уютный офис</h2>
            <p>Тёплый свет, рабочие места, кофе и спокойная команда.</p>
          </div>
          <div class="legend">
            <span><i class="dot work"></i>работает</span>
            <span><i class="dot coffee"></i>кофе</span>
            <span><i class="dot rest"></i>отдыхает</span>
          </div>
        </div>

        <div class="office-stage">
          <div class="wall wall-left"></div>
          <div class="wall wall-top"></div>
          <div class="window window-1"></div>
          <div class="window window-2"></div>
          <div class="board">
            <div class="board-note n1"></div>
            <div class="board-note n2"></div>
            <div class="board-note n3"></div>
            <div class="board-note n4"></div>
          </div>
          <div class="lamp lamp-1"></div>
          <div class="lamp lamp-2"></div>
          <div class="lamp lamp-3"></div>

          <div class="plant plant-a"></div>
          <div class="plant plant-b"></div>
          <div class="plant plant-c"></div>

          <div class="watercooler"></div>
          <div class="coffee-station">
            <span>Кофе</span>
          </div>
          <div class="meeting-pill">СОБРАТЬ</div>

          <div class="office-grid" id="officeGrid"></div>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel summary-panel">
          <h3>Сводка</h3>
          <div class="stats">
            <div class="stat">
              <span>В работе</span>
              <strong id="statWorking">0</strong>
            </div>
            <div class="stat">
              <span>Кофе</span>
              <strong id="statCoffee">0</strong>
            </div>
            <div class="stat">
              <span>Отдых</span>
              <strong id="statRest">0</strong>
            </div>
            <div class="stat">
              <span>Задачи</span>
              <strong id="statTasks">0</strong>
            </div>
          </div>
        </section>

        <section class="panel">
          <h3>Команда</h3>
          <div id="teamList" class="team-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h3>Очередь</h3>
            <button id="addQuickTask" class="tiny-btn">+ добавить</button>
          </div>
          <div id="taskList" class="task-list"></div>
        </section>

        <section class="panel logs-panel">
          <h3>Лента</h3>
          <div id="logList" class="log-list"></div>
        </section>
      </aside>
    </main>
  </div>

  <template id="deskTemplate">
    <div class="desk-node">
      <div class="name-tag"></div>
      <div class="desk">
        <div class="monitor"></div>
        <div class="laptop"></div>
        <div class="mug"></div>
        <div class="chair"></div>
      </div>
      <div class="worker-wrap">
        <div class="speech"></div>
        <div class="worker" data-state="work">
          <div class="px px-1"></div>
          <div class="px px-2"></div>
          <div class="px px-3"></div>
          <div class="px px-4"></div>
          <div class="px px-5"></div>
          <div class="px px-6"></div>
          <div class="px px-7"></div>
          <div class="px px-8"></div>
        </div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
